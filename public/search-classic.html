<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook AI - Recherche Classique</title>
    <link rel="stylesheet" href="search-classic.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Background Decorations -->
    <div class="bg-decoration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="dots-pattern"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <a href="dashboard.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="M19 12H5"></path>
                    </svg>
                </a>
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
                        <circle cx="16" cy="16" r="12" fill="url(#classicSearchGrad)" />
                        <path d="M24 24 L34 34" stroke="url(#classicSearchGrad)" stroke-width="4"
                            stroke-linecap="round" />
                        <defs>
                            <linearGradient id="classicSearchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#1d4ed8" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span>Recherche Avancée</span>
                </div>
            </div>
            <div class="header-right">
                <span id="userEmail" class="user-email">user@example.com</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Hero Section -->
            <div class="hero-section">
                <div class="hero-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </div>
                <h1>Recherche Avancée</h1>
                <p>Trouvez vos emails avec des filtres précis</p>
            </div>

            <!-- Search Form Card -->
            <div class="search-card">
                <form id="searchForm">
                    <!-- Row 1: Expéditeur & Dossier -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="senderInput">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                                Expéditeur
                            </label>
                            <input type="text" id="senderInput" placeholder="nom@exemple.com">
                        </div>
                        <div class="form-group">
                            <label for="folderSelect">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path
                                        d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                                    </path>
                                </svg>
                                Dossier
                            </label>
                            <select id="folderSelect">
                                <option value="INBOX">📥 Boîte de réception</option>
                                <option value="INBOX.Sent">📤 Envoyés</option>
                                <option value="INBOX.Drafts">📝 Brouillons</option>
                                <option value="INBOX.Junk">🚫 Spam</option>
                                <option value="INBOX.Trash">🗑️ Corbeille</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 2: Dates -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dateFrom">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                                    <line x1="16" x2="16" y1="2" y2="6"></line>
                                    <line x1="8" x2="8" y1="2" y2="6"></line>
                                    <line x1="3" x2="21" y1="10" y2="10"></line>
                                </svg>
                                Du
                            </label>
                            <input type="date" id="dateFrom">
                        </div>
                        <div class="form-group">
                            <label for="dateTo">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                                    <line x1="16" x2="16" y1="2" y2="6"></line>
                                    <line x1="8" x2="8" y1="2" y2="6"></line>
                                    <line x1="3" x2="21" y1="10" y2="10"></line>
                                </svg>
                                Au
                            </label>
                            <input type="date" id="dateTo">
                        </div>
                    </div>

                    <!-- Row 3: Keywords -->
                    <div class="form-group full-width">
                        <label for="keywordsInput">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </svg>
                            Mots-clés (sujet ou contenu)
                        </label>
                        <input type="text" id="keywordsInput" placeholder="Rechercher...">
                    </div>

                    <!-- Search Button -->
                    <button type="submit" id="searchBtn" class="search-btn">
                        <span class="btn-dot"></span>
                        <span>Lancer la recherche</span>
                    </button>
                </form>
            </div>

            <!-- Results Section -->
            <div class="results-section hidden" id="resultsSection">
                <div class="results-header">
                    <h2>Résultats</h2>
                    <span class="results-count" id="resultsCount">0 emails trouvés</span>
                </div>
                <div class="results-list" id="resultsList">
                    <!-- Results will be loaded here -->
                </div>
            </div>

            <!-- Loading State -->
            <div class="loading-state hidden" id="loadingState">
                <div class="loading-spinner"></div>
                <p>Recherche en cours...</p>
            </div>

            <!-- Empty State -->
            <div class="empty-state hidden" id="emptyState">
                <div class="empty-icon">🔍</div>
                <h3>Aucun résultat</h3>
                <p>Essayez de modifier vos critères de recherche</p>
            </div>
        </main>
    </div>

    <script src="search-classic.js"></script>
</body>

</html>
