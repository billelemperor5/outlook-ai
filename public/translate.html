<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook AI - Traducteur IA</title>
    <link rel="stylesheet" href="translate.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Background Decorations -->
    <div class="bg-decoration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="dots-pattern"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <a href="dashboard.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="M19 12H5"></path>
                    </svg>
                </a>
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="16" fill="url(#translateGrad)" opacity="0.2" />
                        <circle cx="20" cy="20" r="12" fill="url(#translateGrad)" opacity="0.4" />
                        <text x="20" y="25" text-anchor="middle" fill="url(#translateGrad)" font-size="12"
                            font-weight="bold">AI</text>
                        <defs>
                            <linearGradient id="translateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#f97316" />
                                <stop offset="100%" stop-color="#ea580c" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span>Traducteur <strong>IA</strong></span>
                </div>
            </div>
            <div class="header-right">
                <button id="settingsBtn" class="settings-btn" title="Paramètres API">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
                        </path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
                <span id="userEmail" class="user-email">user@example.com</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Hero Section -->
            <div class="hero-section">
                <div class="hero-icon">🌐</div>
                <h1>Traducteur Intelligent</h1>
                <p>Traduisez vos textes avec l'intelligence artificielle</p>
            </div>

            <!-- Language Selector Bar -->
            <div class="language-bar">
                <div class="lang-group">
                    <label>De :</label>
                    <select id="sourceLang" class="lang-select">
                        <option value="auto">🔍 Détection auto</option>
                        <option value="ar">🇸🇦 العربية</option>
                        <option value="fr">🇫🇷 Français</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="es">🇪🇸 Español</option>
                        <option value="de">🇩🇪 Deutsch</option>
                    </select>
                </div>

                <button id="swapLangs" class="swap-btn" title="Inverser les langues">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M8 3 4 7l4 4"></path>
                        <path d="M4 7h16"></path>
                        <path d="m16 21 4-4-4-4"></path>
                        <path d="M20 17H4"></path>
                    </svg>
                </button>

                <div class="lang-group">
                    <label>Vers :</label>
                    <select id="targetLang" class="lang-select">
                        <option value="fr">🇫🇷 Français</option>
                        <option value="ar">🇸🇦 العربية</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="es">🇪🇸 Español</option>
                        <option value="de">🇩🇪 Deutsch</option>
                    </select>
                </div>
            </div>

            <!-- Translation Panels -->
            <div class="translation-panels">
                <!-- Source Panel -->
                <div class="panel source-panel">
                    <div class="panel-header">
                        <span class="panel-title">Texte original</span>
                        <div class="panel-actions">
                            <button id="clearSource" class="panel-btn" title="Effacer">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                </svg>
                            </button>
                            <button id="pasteSource" class="panel-btn" title="Coller">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect>
                                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <textarea id="sourceText" class="text-area" placeholder="Entrez ou collez votre texte ici..."
                        dir="auto"></textarea>
                    <div class="panel-footer">
                        <span id="charCount" class="char-count">0 caractères</span>
                        <span id="detectedLang" class="detected-lang"></span>
                    </div>
                </div>

                <!-- Target Panel -->
                <div class="panel target-panel">
                    <div class="panel-header">
                        <span class="panel-title">Traduction</span>
                        <div class="panel-actions">
                            <button id="copyResult" class="panel-btn" title="Copier">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                                    <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                                </svg>
                            </button>
                            <button id="speakResult" class="panel-btn" title="Écouter">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="targetText" class="text-area result-area" dir="auto">
                        <span class="placeholder">La traduction apparaîtra ici...</span>
                    </div>
                    <div class="panel-footer">
                        <span id="translationTime" class="translation-time"></span>
                    </div>
                </div>
            </div>

            <!-- Translate Button -->
            <button id="translateBtn" class="translate-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="m5 8 6 6"></path>
                    <path d="m4 14 6-6 2-3"></path>
                    <path d="M2 5h12"></path>
                    <path d="M7 2h1"></path>
                    <path d="m22 22-5-10-5 10"></path>
                    <path d="M14 18h6"></path>
                </svg>
                <span>Traduire</span>
            </button>

            <!-- Quick Style Actions -->
            <div class="quick-actions">
                <button class="quick-btn" data-action="formal">
                    <span class="quick-icon">👔</span>
                    <span>Formel</span>
                </button>
                <button class="quick-btn" data-action="casual">
                    <span class="quick-icon">😊</span>
                    <span>Décontracté</span>
                </button>
                <button class="quick-btn" data-action="professional">
                    <span class="quick-icon">💼</span>
                    <span>Professionnel</span>
                </button>
                <button class="quick-btn" data-action="simplify">
                    <span class="quick-icon">📝</span>
                    <span>Simplifier</span>
                </button>
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="history-header">
                    <h3>
                        <span class="history-icon">📜</span>
                        Historique récent
                    </h3>
                    <button id="clearHistory" class="clear-history-btn">Effacer</button>
                </div>
                <div id="historyList" class="history-list">
                    <div class="history-empty">
                        <p>Aucun historique de traduction</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- API Settings Modal -->
    <div id="apiModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configuration API</h2>
                <button id="closeApiModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>Clé API OpenRouter</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-or-v1-xxxx...">
                    <small>Obtenez votre clé sur <a href="https://openrouter.ai/keys"
                            target="_blank">openrouter.ai</a></small>
                </div>
                <div class="setting-group">
                    <label>Modèle d'IA</label>
                    <select id="aiModelSelect">
                        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Rapide)</option>
                        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                        <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
                    </select>
                </div>
                <button id="saveApiSettings" class="save-btn">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="translate.js"></script>
</body>

</html>
