<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook AI - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Decorative Elements -->
    <div class="bg-decoration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="dots-pattern"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
                        <!-- Envelope base -->
                        <rect x="8" y="16" width="48" height="36" rx="4" fill="url(#envelope-gradient)" />
                        <!-- Envelope flap -->
                        <path d="M8 20 L32 38 L56 20" stroke="#1a56db" stroke-width="3" fill="none" />
                        <!-- AI gear -->
                        <circle cx="48" cy="14" r="10" fill="url(#gear-gradient)" />
                        <circle cx="48" cy="14" r="5" fill="white" />
                        <!-- Sync arrows -->
                        <path d="M42 8 L44 14 L38 14" stroke="#f97316" stroke-width="2" fill="none" />
                        <path d="M54 20 L52 14 L58 14" stroke="#f97316" stroke-width="2" fill="none" />
                        <defs>
                            <linearGradient id="envelope-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#1d4ed8" />
                            </linearGradient>
                            <linearGradient id="gear-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#64748b" />
                                <stop offset="100%" stop-color="#475569" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="logo-title">Outlook AI</h1>
                <p class="logo-subtitle">Connexion sécurisée IMAP</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="input-group">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg>
                    </div>
                    <input type="email" id="email" placeholder="Adresse e-mail" required>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" id="password" placeholder="Mot de passe" required>
                </div>

                <div class="forgot-password">
                    <a href="#">Mot de passe oublié ?</a>
                </div>

                <button type="submit" id="submitBtn" class="login-btn">
                    <span id="btnText">Se connecter</span>
                    <div class="btn-loader hidden" id="btnLoader"></div>
                </button>
            </form>

            <div id="result" class="result hidden"></div>

            <!-- Footer -->
            <div class="login-footer">
                <span>Connexion IMAP sécurisée</span>
            </div>
        </div>
    </div>

    <script src="client.js"></script>
</body>

</html>
